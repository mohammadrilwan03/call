<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Talk With Rilwan's Assistant</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .container {
    background: rgba(0,0,0,0.5);
    padding: 40px 30px;
    border-radius: 16px;
    text-align: center;
    width: 350px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    transition: transform 0.3s;
  }

  .container:hover {
    transform: translateY(-5px);
  }

  h2 {
    margin-bottom: 25px;
    font-size: 24px;
    letter-spacing: 1px;
  }

  input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    margin-bottom: 20px;
    font-size: 16px;
    outline: none;
  }

  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #ff8c00, #ffa733);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    position: relative;
    overflow: hidden;
  }

  button:hover {
    background: linear-gradient(90deg, #ffa733, #ffb84d);
  }

  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .spinner {
    border: 3px solid rgba(255,255,255,0.3);
    border-top: 3px solid #fff;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    animation: spin 1s linear infinite;
    position: absolute;
    top: 50%;
    left: 50%;
    margin: -9px 0 0 -9px;
    display: none;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .alert {
    padding: 12px;
    margin-bottom: 20px;
    border-radius: 8px;
    display: none;
    font-weight: bold;
    font-size: 14px;
  }

  .alert.success { background-color: #4caf50; color: #fff; }
  .alert.error { background-color: #f44336; color: #fff; }

</style>
</head>
<body>

<div class="container">
  <h2>Talk With Rilwan's Assistant</h2>

  <div id="alert" class="alert"></div>

  <input id="number" placeholder="Enter number with country code, e.g. +971501234567">
  <button id="callBtn" onclick="makeCall()">Call
    <div class="spinner" id="spinner"></div>
  </button>
</div>

<script>
async function makeCall() {
    const alertBox = document.getElementById("alert");
    const btn = document.getElementById("callBtn");
    const spinner = document.getElementById("spinner");

    alertBox.style.display = 'none';
    let number = document.getElementById("number").value.trim();

    if (!number.startsWith('+')) {
        alertBox.textContent = "Please include the country code starting with +";
        alertBox.className = "alert error";
        alertBox.style.display = 'block';
        return;
    }

    // Show spinner & disable button
    spinner.style.display = 'block';
    btn.disabled = true;

    try {
        const res = await fetch("/call", { 
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ number })
        });

        const data = await res.json();

        if (data.success) {
            alertBox.textContent = "✅ Call initiated! SID: " + data.sid;
            alertBox.className = "alert success";
        } else {
            alertBox.textContent = "❌ Error: " + data.error;
            alertBox.className = "alert error";
        }
        alertBox.style.display = 'block';
    } catch (err) {
        alertBox.textContent = "❌ Network or server error: " + err.message;
        alertBox.className = "alert error";
        alertBox.style.display = 'block';
    } finally {
        spinner.style.display = 'none';
        btn.disabled = false;
    }
}
</script>

</body>
</html>
