<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Talk With Rilwan's Assistant</title>
<style>
  /* Body and animated background */
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(120deg, #1e3c72, #2a5298, #6dd5fa);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
  }

  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Glass-like container */
  .container {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    padding: 45px 35px;
    border-radius: 25px;
    width: 380px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    text-align: center;
    border: 2px solid rgba(255,255,255,0.2);
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .container:hover {
    transform: translateY(-5px);
    box-shadow: 0 25px 60px rgba(0,0,0,0.6);
  }

  h2 {
    color: #fff;
    margin-bottom: 10px;
    font-size: 28px;
    letter-spacing: 1px;
  }

  p {
    color: #f0f0f0;
    font-size: 14px;
    margin-bottom: 25px;
  }

  /* Input field */
  input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: none;
    margin-bottom: 20px;
    font-size: 16px;
    outline: none;
    background: rgba(255,255,255,0.2);
    color: #fff;
    transition: 0.3s;
  }

  input::placeholder {
    color: rgba(255, 255, 255, 0.7);
  }

  input:focus {
    background: rgba(255,255,255,0.3);
    box-shadow: 0 0 15px rgba(255,255,255,0.4);
  }

  /* Button styling */
  button {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    background: linear-gradient(90deg, #ff416c, #ff4b2b);
    transition: 0.4s;
    position: relative;
    overflow: hidden;
  }

  button:hover {
    background: linear-gradient(90deg, #ff4b2b, #ff416c);
    transform: scale(1.05);
    box-shadow: 0 8px 25px rgba(255,75,43,0.6);
  }

  /* Spinner inside button */
  .spinner {
    border: 3px solid rgba(255,255,255,0.3);
    border-top: 3px solid #fff;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    animation: spin 1s linear infinite;
    position: absolute;
    top: 50%;
    left: 50%;
    margin: -9px 0 0 -9px;
    display: none;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* Alert */
  .alert {
    padding: 12px;
    margin-bottom: 20px;
    border-radius: 12px;
    display: none;
    font-weight: bold;
    font-size: 14px;
    text-align: center;
    color: #fff;
    transition: 0.3s;
  }

  .alert.success { background-color: rgba(76, 175, 80, 0.9); }
  .alert.error { background-color: rgba(244, 67, 54, 0.9); }
</style>
</head>
<body>

<div class="container">
  <h2>Talk With Rilwan's Assistant</h2>
  <p>Enter the number with country code and press "Call" to start.</p>

  <div id="alert" class="alert"></div>

  <input id="number" placeholder="e.g. +971501234567">
  <button id="callBtn" onclick="makeCall()">Call
    <div class="spinner" id="spinner"></div>
  </button>
</div>

<script>
async function makeCall() {
    const alertBox = document.getElementById("alert");
    const btn = document.getElementById("callBtn");
    const spinner = document.getElementById("spinner");

    alertBox.style.display = 'none';
    let number = document.getElementById("number").value.trim();

    if (!number.startsWith('+')) {
        alertBox.textContent = "Please include the country code starting with +";
        alertBox.className = "alert error";
        alertBox.style.display = 'block';
        return;
    }

    spinner.style.display = 'block';
    btn.disabled = true;

    try {
        const res = await fetch("/call", { 
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ number })
        });

        const data = await res.json();

        if (data.success) {
            alertBox.textContent = "✅ Call initiated! SID: " + data.sid;
            alertBox.className = "alert success";
        } else {
            alertBox.textContent = "❌ Error: " + data.error;
            alertBox.className = "alert error";
        }
        alertBox.style.display = 'block';
    } catch (err) {
        alertBox.textContent = "❌ Network or server error: " + err.message;
        alertBox.className = "alert error";
        alertBox.style.display = 'block';
    } finally {
        spinner.style.display = 'none';
        btn.disabled = false;
    }
}
</script>

</body>
</html>
