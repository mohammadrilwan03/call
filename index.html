<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Talk With Rilwan's Assistant</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .container {
    background: rgba(0,0,0,0.4);
    padding: 40px;
    border-radius: 12px;
    text-align: center;
    width: 320px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  }

  h2 {
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    margin-bottom: 20px;
    font-size: 16px;
  }

  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background-color: #ff8c00;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    background-color: #ffa733;
  }

  .alert {
    padding: 10px;
    margin-bottom: 20px;
    border-radius: 6px;
    display: none;
    font-weight: bold;
  }

  .alert.success { background-color: #4caf50; color: #fff; }
  .alert.error { background-color: #f44336; color: #fff; }

</style>
</head>
<body>

<div class="container">
  <h2>Talk With Rilwan's Assistant</h2>

  <div id="alert" class="alert"></div>

  <input id="number" placeholder="Enter number with country code, e.g. +971501234567">
  <button onclick="makeCall()">Call</button>
</div>

<script>
async function makeCall() {
    const alertBox = document.getElementById("alert");
    alertBox.style.display = 'none';

    let number = document.getElementById("number").value.trim();

    if (!number.startsWith('+')) {
        alertBox.textContent = "Please include the country code starting with +";
        alertBox.className = "alert error";
        alertBox.style.display = 'block';
        return;
    }

    try {
        const res = await fetch("/call", { 
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ number })
        });

        const data = await res.json();

        if (data.success) {
            alertBox.textContent = "✅ Call initiated! SID: " + data.sid;
            alertBox.className = "alert success";
        } else {
            alertBox.textContent = "❌ Error: " + data.error;
            alertBox.className = "alert error";
        }
        alertBox.style.display = 'block';
    } catch (err) {
        alertBox.textContent = "❌ Network or server error: " + err.message;
        alertBox.className = "alert error";
        alertBox.style.display = 'block';
    }
}
</script>

</body>
</html>
