<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talk With Rilwan's Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
    }

    /* 🔥 TOP ALERT (NEW CHANGE) */
    .alert {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 25px;
      border-radius: 10px;
      font-weight: 600;
      display: none;
      text-align: center;
      color: #fff;
      z-index: 9999;
      min-width: 300px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .alert.success {
      background-color: rgba(0, 255, 240, 0.2);
      color: #00fff0;
    }

    .alert.error {
      background-color: rgba(255, 0, 0, 0.2);
      color: #ff4c4c;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 40px 30px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 15px 25px rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 5px;
      color: #00fff0;
    }

    h2 {
      font-size: 18px;
      font-weight: 400;
      margin-bottom: 25px;
      color: rgba(255,255,255,0.7);
    }

    input[type="text"] {
      width: 100%;
      padding: 15px 20px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      margin-bottom: 20px;
      background-color: rgba(255,255,255,0.1);
      color: #fff;
    }

    input[type="text"]::placeholder {
      color: rgba(255,255,255,0.6);
    }

    input[type="text"]:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(0,255,240,0.3);
      background-color: rgba(255,255,255,0.15);
    }

    button {
      background: #00fff0;
      color: #0f2027;
      padding: 15px 25px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    button:hover {
      background: #0f2027;
      color: #00fff0;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,255,240,0.3);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .spinner {
      border: 3px solid rgba(255,255,255,0.3);
      border-top: 3px solid #fff;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      animation: spin 1s linear infinite;
      position: absolute;
      top: 50%;
      left: 50%;
      margin: -9px 0 0 -9px;
      display: none;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<!-- 🔥 ALERT MOVED OUTSIDE -->
<div id="alert" class="alert"></div>

<div class="container">
  <h1>Calling</h1>
  <h2>Talk With Rilwan's Assistant</h2>

  <input id="number" type="text" placeholder="Enter number with country code e.g. +971501234567" />

  <button id="callBtn" onclick="makeCall()">📞 Make Call
    <div class="spinner" id="spinner"></div>
  </button>
</div>

<script>
async function makeCall() {
    const numberInput = document.getElementById("number");
    const alertBox = document.getElementById("alert");
    const btn = document.getElementById("callBtn");
    const spinner = document.getElementById("spinner");

    let number = numberInput.value.trim();

    // Reset alert
    alertBox.style.display = 'none';
    alertBox.textContent = '';
    alertBox.classList.remove('success', 'error');

    if (!number.startsWith('+')) {
        showAlert("⚠️ Please include country code starting with +", "error");
        return;
    }

    spinner.style.display = 'block';
    btn.disabled = true;

    try {
        const res = await fetch("/call", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ number })
        });

        const data = await res.json();

        if (data.success) {
            showAlert(`✅ Call initiated!`, "success");
        } else {
            showAlert(`❌ Error: ${data.error}`, "error");
        }

    } catch (err) {
        showAlert(`❌ Network error: ${err.message}`, "error");
    } finally {
        spinner.style.display = 'none';
        btn.disabled = false;
    }
}

// 🔥 ALERT FUNCTION (AUTO HIDE)
function showAlert(message, type) {
    const alertBox = document.getElementById("alert");
    alertBox.textContent = message;
    alertBox.className = "alert " + type;
    alertBox.style.display = 'block';

    setTimeout(() => {
        alertBox.style.display = 'none';
    }, 4000);
}
</script>

</body>
</html>
